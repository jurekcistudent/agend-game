name: Deploy to SpacetimeDB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Install SpacetimeDB CLI
        run: |
          curl -L https://github.com/clockworklabs/SpacetimeDB/releases/download/v2.0.5/spacetime-x86_64-unknown-linux-gnu.tar.gz -o spacetime.tar.gz
          tar -xzf spacetime.tar.gz
          mkdir -p ~/.local/bin
          mv spacetimedb-cli ~/.local/bin/spacetime
          chmod +x ~/.local/bin/spacetime
          echo ~/.local/bin >> $GITHUB_PATH
          rm spacetime.tar.gz
      
      - name: Publish Module
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          spacetime publish agend-game --yes --no-config
        env:
          SPACETIME_TOKEN: ${{ secrets.SPACETIME_TOKEN }}
