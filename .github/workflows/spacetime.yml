name: Deploy to SpacetimeDB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Install SpacetimeDB CLI
        run: |
          mkdir -p ~/.spacetime/bin
          curl -L https://github.com/clockworklabs/SpacetimeDB/releases/latest/download/spacetime-x86_64-unknown-linux.tar.gz | tar -xz -C ~/.spacetime/bin
          echo ~/.spacetime/bin >> $GITHUB_PATH
      
      - name: Publish Module
        run: |
          export PATH="$HOME/.spacetime/bin:$PATH"
          spacetime publish agend-game --yes --no-config
        env:
          SPACETIME_TOKEN: ${{ secrets.SPACETIME_TOKEN }}
